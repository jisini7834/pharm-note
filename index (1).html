<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💊 PharmNote — 전문약 사전</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== CSS VARIABLES ===== */
    :root {
      --bg-base: #F7F8FC;
      --bg-card: #FFFFFF;
      --bg-sidebar: #FFFFFF;
      --sidebar-width: 270px;

      --primary: #6C9FE8;
      --primary-light: #EAF1FD;
      --primary-dark: #4A7CC8;
      --mint: #5DC8B8;
      --mint-light: #E6F7F5;
      --rose: #F97FA3;
      --rose-light: #FEF0F5;
      --amber: #F9C74F;
      --amber-light: #FEF9E7;
      --purple: #A78BFA;
      --purple-light: #F0EBFF;
      --green: #6BCB77;
      --green-light: #EDF7EE;

      --text-primary: #1A1D2E;
      --text-secondary: #6B7280;
      --text-muted: #9CA3AF;
      --border: #E8ECEF;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.10);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);

      --radius-sm: 10px;
      --radius-md: 16px;
      --radius-lg: 22px;
      --radius-xl: 28px;

      --transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
    }

    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== TOP NAV ===== */
    .topnav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 62px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1.5px solid var(--border);
      display: flex; align-items: center;
      padding: 0 24px;
      gap: 16px;
      box-shadow: var(--shadow-sm);
    }
    .topnav-logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.15rem; font-weight: 700;
      color: var(--primary-dark);
      white-space: nowrap;
      text-decoration: none;
    }
    .topnav-logo .logo-icon {
      font-size: 1.5rem;
      background: var(--primary-light);
      border-radius: 12px;
      padding: 4px 8px;
    }
    .search-wrapper {
      flex: 1; max-width: 520px; margin: 0 auto;
      position: relative;
    }
    .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 1rem; pointer-events: none;
    }
    #searchInput {
      width: 100%; height: 40px;
      background: var(--bg-base);
      border: 2px solid var(--border);
      border-radius: 40px;
      padding: 0 16px 0 40px;
      font-size: 0.9rem;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text-primary);
      outline: none;
      transition: var(--transition);
    }
    #searchInput:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(108,159,232,0.12);
    }
    #searchInput::placeholder { color: var(--text-muted); }

    /* Search dropdown */
    .search-dropdown {
      position: absolute; top: calc(100% + 8px); left: 0; right: 0;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      max-height: 320px; overflow-y: auto;
      display: none; z-index: 200;
    }
    .search-dropdown.show { display: block; }
    .search-item {
      padding: 10px 16px; cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: var(--transition);
    }
    .search-item:last-child { border-bottom: none; }
    .search-item:hover { background: var(--primary-light); }
    .search-item-name { font-weight: 600; font-size: 0.9rem; }
    .search-item-meta { font-size: 0.78rem; color: var(--text-secondary); margin-top: 2px; }
    .search-highlight { background: #ffe066; border-radius: 3px; padding: 0 2px; }

    .topnav-right {
      display: flex; align-items: center; gap: 8px;
      margin-left: auto; white-space: nowrap;
    }
    .badge-guide {
      font-size: 0.75rem; font-weight: 600;
      background: var(--mint-light); color: #0f9b8e;
      border-radius: 20px; padding: 4px 12px;
    }

    /* ===== LAYOUT ===== */
    .app-layout {
      display: flex;
      margin-top: 62px;
      min-height: calc(100vh - 62px);
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: var(--bg-sidebar);
      border-right: 1.5px solid var(--border);
      height: calc(100vh - 62px);
      position: sticky; top: 62px;
      overflow-y: auto;
      padding: 20px 0 40px;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .sidebar-section-label {
      font-size: 0.7rem; font-weight: 700;
      color: var(--text-muted); letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0 20px 8px;
    }

    .category-item { margin-bottom: 4px; }
    .category-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px 10px 20px;
      cursor: pointer;
      border-radius: 0;
      transition: var(--transition);
      user-select: none;
    }
    .category-header:hover { background: var(--primary-light); }
    .category-icon {
      font-size: 1.1rem;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 10px;
      background: var(--primary-light);
    }
    .category-name { font-size: 0.88rem; font-weight: 700; flex: 1; }
    .category-chevron {
      font-size: 0.7rem; color: var(--text-muted);
      transition: transform 0.22s;
    }
    .category-item.open .category-chevron { transform: rotate(180deg); }

    .disease-list {
      max-height: 0; overflow: hidden;
      transition: max-height 0.32s cubic-bezier(0.4,0,0.2,1);
    }
    .category-item.open .disease-list { max-height: 1000px; }

    .disease-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px 8px 56px;
      cursor: pointer;
      font-size: 0.84rem; color: var(--text-secondary);
      transition: var(--transition);
      border-radius: 0;
      border-left: 3px solid transparent;
    }
    .disease-item:hover {
      background: var(--primary-light);
      color: var(--primary-dark);
      border-left-color: var(--primary);
    }
    .disease-item.active {
      background: var(--primary-light);
      color: var(--primary-dark);
      font-weight: 700;
      border-left-color: var(--primary-dark);
    }

    /* ===== MAIN CONTENT ===== */
    .main-content {
      flex: 1;
      padding: 32px 36px 60px;
      min-width: 0;
      overflow-y: auto;
    }

    /* ===== WELCOME SCREEN ===== */
    .welcome-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 60vh; text-align: center; gap: 20px;
    }
    .welcome-emoji { font-size: 5rem; animation: float 3s ease-in-out infinite; }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .welcome-title { font-size: 1.7rem; font-weight: 700; color: var(--text-primary); }
    .welcome-sub { font-size: 0.95rem; color: var(--text-secondary); max-width: 420px; line-height: 1.7; }
    .welcome-tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
    .welcome-tag {
      padding: 6px 14px; border-radius: 20px;
      font-size: 0.8rem; font-weight: 600;
      background: var(--primary-light); color: var(--primary-dark);
      cursor: pointer; transition: var(--transition);
    }
    .welcome-tag:hover { background: var(--primary); color: #fff; transform: translateY(-2px); }

    /* ===== DISEASE HEADER ===== */
    .disease-header {
      margin-bottom: 28px;
      animation: fadeInUp 0.32s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .disease-header-top {
      display: flex; align-items: flex-start; gap: 16px; flex-wrap: wrap;
    }
    .disease-title-block { flex: 1; }
    .disease-name {
      font-size: 1.9rem; font-weight: 800;
      color: var(--text-primary); line-height: 1.2;
    }
    .disease-guideline {
      display: inline-block; margin-top: 6px;
      font-size: 0.78rem; font-weight: 600;
      background: var(--mint-light); color: #0f9b8e;
      border-radius: 20px; padding: 4px 12px;
    }
    .disease-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .disease-tag {
      font-size: 0.75rem; font-weight: 600;
      background: var(--primary-light); color: var(--primary-dark);
      border-radius: 20px; padding: 3px 10px;
    }

    /* ===== SECTION GRID ===== */
    .section-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
      animation: fadeInUp 0.38s ease;
    }
    .section-full { grid-column: 1 / -1; }

    /* ===== CARDS ===== */
    .card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      transition: box-shadow 0.22s, transform 0.22s;
    }
    .card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

    .card-header {
      display: flex; align-items: center; gap: 10px;
      padding: 16px 20px 14px;
      border-bottom: 1.5px solid var(--border);
    }
    .card-header-icon {
      width: 34px; height: 34px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }
    .card-header-title { font-size: 0.95rem; font-weight: 700; }
    .card-body { padding: 18px 20px; }

    /* Overview card */
    .overview-text {
      font-size: 0.9rem; line-height: 1.85;
      color: var(--text-secondary);
    }

    /* Criteria table */
    .criteria-table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    .criteria-table th {
      background: var(--bg-base); padding: 8px 12px;
      text-align: left; font-weight: 700; font-size: 0.78rem;
      color: var(--text-secondary); border-bottom: 2px solid var(--border);
    }
    .criteria-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); }
    .criteria-table tr:last-child td { border-bottom: none; }
    .criteria-table tr:hover td { background: var(--primary-light); }
    .criteria-label { font-weight: 700; color: var(--text-primary); }

    /* Guidelines */
    .guideline-section { margin-bottom: 18px; }
    .guideline-section:last-child { margin-bottom: 0; }
    .guideline-title {
      font-size: 0.88rem; font-weight: 700;
      color: var(--text-primary); margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 2px dashed var(--border);
    }
    .guideline-item {
      display: flex; gap: 10px;
      font-size: 0.84rem; line-height: 1.7;
      color: var(--text-secondary);
      padding: 5px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .guideline-item:last-child { border-bottom: none; }
    .guideline-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--primary); flex-shrink: 0;
      margin-top: 7px;
    }
    .guideline-item.warning .guideline-dot { background: #f59e0b; }
    .guideline-item.warning { color: #92400e; }

    /* Drug cards */
    .drug-card {
      background: var(--bg-base);
      border-radius: var(--radius-md);
      border: 1.5px solid var(--border);
      padding: 16px;
      margin-bottom: 12px;
      transition: var(--transition);
    }
    .drug-card:last-child { margin-bottom: 0; }
    .drug-card:hover { border-color: var(--primary); background: var(--primary-light); }
    .drug-card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
    .drug-badge {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 800; flex-shrink: 0;
    }
    .drug-name { font-size: 0.93rem; font-weight: 700; color: var(--text-primary); }
    .drug-brand { font-size: 0.77rem; color: var(--text-muted); margin-top: 2px; }
    .drug-rows { display: flex; flex-direction: column; gap: 6px; }
    .drug-row { display: flex; gap: 8px; font-size: 0.82rem; }
    .drug-row-label {
      min-width: 58px; font-weight: 700; font-size: 0.75rem;
      color: var(--text-secondary); padding-top: 1px;
    }
    .drug-row-value { color: var(--text-primary); line-height: 1.6; flex: 1; }
    .drug-note {
      margin-top: 10px; padding: 8px 12px;
      background: rgba(108,159,232,0.07); border-radius: 8px;
      font-size: 0.8rem; color: var(--text-secondary); line-height: 1.6;
      border-left: 3px solid var(--primary);
    }

    /* Side effects & Contraindications */
    .pill-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill {
      font-size: 0.79rem; font-weight: 600;
      border-radius: 20px; padding: 5px 13px;
      line-height: 1.4;
    }
    .pill-warning { background: #FEF3C7; color: #92400E; }
    .pill-danger { background: #FEE2E2; color: #991B1B; }
    .pill-info { background: var(--primary-light); color: var(--primary-dark); }

    .list-item {
      display: flex; gap: 10px;
      font-size: 0.84rem; line-height: 1.7;
      padding: 6px 0; border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .list-item:last-child { border-bottom: none; }
    .list-bullet { flex-shrink: 0; margin-top: 8px; width: 5px; height: 5px; background: var(--rose); border-radius: 50%; }
    .list-bullet-contra { background: #ef4444; }
    .list-bullet-combo { background: var(--mint); }

    /* Color themes for cards */
    .theme-blue .card-header-icon { background: var(--primary-light); }
    .theme-mint .card-header-icon { background: var(--mint-light); }
    .theme-rose .card-header-icon { background: var(--rose-light); }
    .theme-amber .card-header-icon { background: var(--amber-light); }
    .theme-purple .card-header-icon { background: var(--purple-light); }
    .theme-green .card-header-icon { background: var(--green-light); }

    /* Tabs */
    .tab-bar {
      display: flex; gap: 4px;
      background: var(--bg-base); border-radius: 12px;
      padding: 4px; margin-bottom: 16px;
      border: 1.5px solid var(--border);
    }
    .tab-btn {
      flex: 1; padding: 8px 10px;
      border: none; background: transparent;
      border-radius: 9px; font-size: 0.8rem; font-weight: 700;
      color: var(--text-muted); cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      transition: var(--transition);
    }
    .tab-btn.active {
      background: #fff; color: var(--primary-dark);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    /* No result */
    .no-result {
      text-align: center; padding: 60px 20px;
      color: var(--text-muted);
    }
    .no-result-emoji { font-size: 3rem; margin-bottom: 12px; }

    /* Scrollbar */
    .main-content::-webkit-scrollbar { width: 6px; }
    .main-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      :root { --sidebar-width: 220px; }
      .main-content { padding: 20px 18px 40px; }
    }
    @media (max-width: 680px) {
      .sidebar { display: none; }
      .main-content { padding: 16px 12px 40px; }
      .section-grid { grid-template-columns: 1fr; }
      .topnav-logo span { display: none; }
    }
  </style>
</head>
<body>

<!-- TOP NAV -->
<nav class="topnav">
  <a class="topnav-logo" href="#">
    <span class="logo-icon">💊</span>
    <span>PharmNote</span>
  </a>
  <div class="search-wrapper">
    <span class="search-icon">🔍</span>
    <input id="searchInput" type="text" placeholder="질환명 또는 성분명으로 검색..." autocomplete="off" />
    <div class="search-dropdown" id="searchDropdown"></div>
  </div>
  <div class="topnav-right">
    <span class="badge-guide">심혈관계 전문약</span>
  </div>
</nav>

<!-- APP LAYOUT -->
<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section-label">질환 목록</div>
    <div id="categoryList"></div>
  </aside>

  <!-- MAIN -->
  <main class="main-content" id="mainContent">
    <div class="welcome-screen" id="welcomeScreen">
      <div class="welcome-emoji">🫀</div>
      <div class="welcome-title">전문약 공부 도우미</div>
      <div class="welcome-sub">
        좌측 메뉴에서 질환을 선택하거나<br/>
        상단 검색창에서 성분명·질환명을 검색하세요.
      </div>
      <div class="welcome-tags" id="quickLinks"></div>
    </div>
    <div id="diseaseView" style="display:none;"></div>
  </main>

</div>

<script>
// ======================================================
// DATA LOADER & APP STATE
// ======================================================
let appData = null;
let currentDiseaseId = null;

async function loadData() {
  const resp = await fetch('data.json');
  appData = await resp.json();
  init();
}

function init() {
  buildSidebar();
  buildQuickLinks();
  setupSearch();
}

// ======================================================
// SIDEBAR
// ======================================================
function buildSidebar() {
  const container = document.getElementById('categoryList');
  appData.categories.forEach(cat => {
    const item = document.createElement('div');
    item.className = 'category-item';
    item.innerHTML = `
      <div class="category-header" onclick="toggleCategory(this)">
        <div class="category-icon">${cat.icon}</div>
        <span class="category-name">${cat.name}</span>
        <span class="category-chevron">▼</span>
      </div>
      <div class="disease-list">
        ${cat.diseases.map(d => `
          <div class="disease-item" data-id="${d.id}" onclick="showDisease('${d.id}')">
            ${d.name}
          </div>
        `).join('')}
      </div>
    `;
    container.appendChild(item);
    // auto-open first category
    if (appData.categories.indexOf(cat) === 0) {
      item.classList.add('open');
    }
  });
}

function toggleCategory(header) {
  const item = header.parentElement;
  item.classList.toggle('open');
}

function buildQuickLinks() {
  const container = document.getElementById('quickLinks');
  appData.categories.forEach(cat => {
    cat.diseases.forEach(d => {
      const btn = document.createElement('span');
      btn.className = 'welcome-tag';
      btn.textContent = d.name;
      btn.onclick = () => showDisease(d.id);
      container.appendChild(btn);
    });
  });
}

// ======================================================
// DISEASE VIEW
// ======================================================
function showDisease(id) {
  currentDiseaseId = id;
  let disease = null;
  let catColor = '#6C9FE8';
  appData.categories.forEach(cat => {
    const found = cat.diseases.find(d => d.id === id);
    if (found) { disease = found; catColor = cat.color || '#6C9FE8'; }
  });
  if (!disease) return;

  // Sidebar active
  document.querySelectorAll('.disease-item').forEach(el => el.classList.remove('active'));
  const active = document.querySelector(`.disease-item[data-id="${id}"]`);
  if (active) { active.classList.add('active'); active.scrollIntoView({block:'nearest'}); }

  // Show/hide screens
  document.getElementById('welcomeScreen').style.display = 'none';
  const view = document.getElementById('diseaseView');
  view.style.display = 'block';
  view.innerHTML = renderDisease(disease, catColor);
}

function renderDisease(d, color) {
  return `
    <div class="disease-header">
      <div class="disease-header-top">
        <div class="disease-title-block">
          <div class="disease-name">${d.name}</div>
          <span class="disease-guideline">📋 ${d.guideline}</span>
          <div class="disease-tags">
            ${(d.tags || []).map(t => `<span class="disease-tag">${t}</span>`).join('')}
          </div>
        </div>
      </div>
    </div>

    <div class="section-grid">
      <!-- Overview + Criteria -->
      ${d.overview ? `
      <div class="card section-full theme-blue">
        <div class="card-header">
          <div class="card-header-icon">📖</div>
          <div class="card-header-title">질환 개요</div>
        </div>
        <div class="card-body">
          <p class="overview-text">${d.overview}</p>
        </div>
      </div>` : ''}

      ${d.criteria && d.criteria.length > 0 ? `
      <div class="card section-full theme-mint">
        <div class="card-header">
          <div class="card-header-icon">📊</div>
          <div class="card-header-title">진단 기준</div>
        </div>
        <div class="card-body">
          <table class="criteria-table">
            <thead><tr>
              <th>분류</th>
              <th>수축기/주요 기준</th>
              <th>이완기/세부 기준</th>
            </tr></thead>
            <tbody>
              ${d.criteria.map(c => `<tr>
                <td class="criteria-label">${c.label}</td>
                <td>${c.sbp}</td>
                <td>${c.dbp}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>` : ''}

      <!-- Guidelines -->
      ${d.guidelines && d.guidelines.length > 0 ? `
      <div class="card section-full theme-amber">
        <div class="card-header">
          <div class="card-header-icon">🏥</div>
          <div class="card-header-title">임상 가이드라인</div>
        </div>
        <div class="card-body">
          ${d.guidelines.map(g => `
            <div class="guideline-section">
              <div class="guideline-title">${g.title}</div>
              ${g.items.map(item => `
                <div class="guideline-item${item.startsWith('⚠️') ? ' warning' : ''}">
                  <div class="guideline-dot"></div>
                  <div>${item}</div>
                </div>
              `).join('')}
            </div>
          `).join('')}
        </div>
      </div>` : ''}

      <!-- First Line Drugs -->
      ${d.firstLine && d.firstLine.length > 0 ? `
      <div class="card theme-blue">
        <div class="card-header">
          <div class="card-header-icon">💊</div>
          <div class="card-header-title">1차 치료 약물</div>
        </div>
        <div class="card-body">
          ${d.firstLine.map((drug, i) => renderDrugCard(drug, i, 'first')).join('')}
        </div>
      </div>` : ''}

      <!-- Second Line Drugs -->
      ${d.secondLine && d.secondLine.length > 0 ? `
      <div class="card theme-purple">
        <div class="card-header">
          <div class="card-header-icon">🔬</div>
          <div class="card-header-title">2차 치료 약물</div>
        </div>
        <div class="card-body">
          ${d.secondLine.map((drug, i) => renderDrugCard(drug, i, 'second')).join('')}
        </div>
      </div>` : ''}

      <!-- Side Effects -->
      ${d.sideEffects && d.sideEffects.length > 0 ? `
      <div class="card theme-rose">
        <div class="card-header">
          <div class="card-header-icon">⚠️</div>
          <div class="card-header-title">주요 부작용</div>
        </div>
        <div class="card-body">
          ${d.sideEffects.map(s => `
            <div class="list-item">
              <div class="list-bullet"></div>
              <div>${s}</div>
            </div>
          `).join('')}
        </div>
      </div>` : ''}

      <!-- Contraindications -->
      ${d.contraindications && d.contraindications.length > 0 ? `
      <div class="card theme-rose">
        <div class="card-header">
          <div class="card-header-icon">🚫</div>
          <div class="card-header-title">금기 및 주의사항</div>
        </div>
        <div class="card-body">
          ${d.contraindications.map(c => `
            <div class="list-item">
              <div class="list-bullet list-bullet-contra"></div>
              <div>${c}</div>
            </div>
          `).join('')}
        </div>
      </div>` : ''}

      <!-- Combos -->
      ${d.combos && d.combos.length > 0 ? `
      <div class="card section-full theme-mint">
        <div class="card-header">
          <div class="card-header-icon">🔗</div>
          <div class="card-header-title">병용요법 및 치료 전략</div>
        </div>
        <div class="card-body">
          ${d.combos.map(c => `
            <div class="list-item">
              <div class="list-bullet list-bullet-combo"></div>
              <div>${c}</div>
            </div>
          `).join('')}
        </div>
      </div>` : ''}
    </div>
  `;
}

const drugColors = [
  { bg: '#EAF1FD', text: '#4A7CC8' },
  { bg: '#E6F7F5', text: '#0f9b8e' },
  { bg: '#FEF0F5', text: '#c4547e' },
  { bg: '#FEF9E7', text: '#c07c05' },
  { bg: '#F0EBFF', text: '#7c3aed' },
  { bg: '#EDF7EE', text: '#166534' },
];
const drugEmojis = ['💊','🧪','💉','🔬','🧬','⚗️','🌿','🩺'];

function renderDrugCard(drug, i, type) {
  const col = drugColors[i % drugColors.length];
  const emoji = drugEmojis[i % drugEmojis.length];
  return `
    <div class="drug-card">
      <div class="drug-card-header">
        <div class="drug-badge" style="background:${col.bg};color:${col.text}">${emoji}</div>
        <div>
          <div class="drug-name">${drug.name}</div>
          ${drug.brand ? `<div class="drug-brand">🏷 ${drug.brand}</div>` : ''}
        </div>
      </div>
      <div class="drug-rows">
        ${drug.mechanism ? `<div class="drug-row">
          <span class="drug-row-label">작용기전</span>
          <span class="drug-row-value">${drug.mechanism}</span>
        </div>` : ''}
        ${drug.dosage ? `<div class="drug-row">
          <span class="drug-row-label">용법·용량</span>
          <span class="drug-row-value">${drug.dosage}</span>
        </div>` : ''}
      </div>
      ${drug.notes ? `<div class="drug-note">💡 ${drug.notes}</div>` : ''}
    </div>
  `;
}

// ======================================================
// SEARCH
// ======================================================
function setupSearch() {
  const input = document.getElementById('searchInput');
  const dropdown = document.getElementById('searchDropdown');

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    if (!q) { dropdown.classList.remove('show'); return; }

    const results = [];
    appData.categories.forEach(cat => {
      cat.diseases.forEach(d => {
        // match disease name
        if (d.name.includes(q) || d.name.toLowerCase().includes(q)) {
          results.push({ type: 'disease', disease: d, matchText: d.name, meta: cat.name + ' / ' + d.guideline });
        }
        // match drugs
        const allDrugs = [...(d.firstLine||[]), ...(d.secondLine||[])];
        allDrugs.forEach(drug => {
          if (drug.name.toLowerCase().includes(q) || (drug.brand||'').toLowerCase().includes(q)) {
            results.push({ type: 'drug', disease: d, matchText: drug.name, brand: drug.brand, meta: cat.name + ' > ' + d.name });
          }
        });
        // match tags
        (d.tags||[]).forEach(tag => {
          if (tag.toLowerCase().includes(q)) {
            results.push({ type: 'tag', disease: d, matchText: tag, meta: cat.name + ' > ' + d.name });
          }
        });
      });
    });

    // deduplicate by disease id for disease matches
    const seen = new Set();
    const unique = results.filter(r => {
      const key = r.disease.id + r.matchText;
      if (seen.has(key)) return false;
      seen.add(key); return true;
    });

    if (unique.length === 0) {
      dropdown.innerHTML = '<div class="search-item"><div class="search-item-name">검색 결과 없음</div></div>';
    } else {
      dropdown.innerHTML = unique.slice(0, 12).map(r => `
        <div class="search-item" onclick="selectSearch('${r.disease.id}')">
          <div class="search-item-name">${highlight(r.matchText, q)}${r.type === 'drug' && r.brand ? ` <span style="color:var(--text-muted);font-size:0.78rem">(${r.brand})</span>` : ''}</div>
          <div class="search-item-meta">${r.meta}</div>
        </div>
      `).join('');
    }
    dropdown.classList.add('show');
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { dropdown.classList.remove('show'); input.blur(); }
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-wrapper')) dropdown.classList.remove('show');
  });
}

function highlight(text, q) {
  if (!q) return text;
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0,idx) + `<span class="search-highlight">${text.slice(idx, idx+q.length)}</span>` + text.slice(idx+q.length);
}

function selectSearch(id) {
  document.getElementById('searchDropdown').classList.remove('show');
  document.getElementById('searchInput').value = '';
  showDisease(id);
}

      <div class="no-result-emoji">⚠️</div>
      <div><b>data.json을 불러올 수 없습니다.</b><br/>

      file:// 프로토콜로는 JSON 로딩이 차단됩니다.</div>
    </div>
  `;
});
